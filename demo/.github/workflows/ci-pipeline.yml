name: SocialHub CI/CD Pipeline

# 🚀 Trigger the pipeline every time you push to the 'main' branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Grab your code from the repository
      - name: 🛎️ Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Java 21 (Matches your local Windows setup!)
      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Step 3: Build the Spring Boot Backend
      - name: 🔨 Build Backend with Maven
        run: mvn clean package -DskipTests

      # Step 4: Test the Docker Compose build
      - name: 🐳 Test Docker Compose Build
        run: docker-compose build
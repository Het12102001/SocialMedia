spring.application.name=demo

# --- THE DOCKER MAGIC ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/social_media}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
